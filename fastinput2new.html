<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
        <title>input</title>
        <meta content="Bryan M" name="author" />
        <meta name="theme-color" content="indigo" />
        <meta name="robots" content="noindex" />
        <link href="originalgolf.svg" rel="icon" type="image/x-icon" />
        <link rel="apple-touch-icon" sizes="180x180" href="originalgolf.svg" />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

        <script src="https://unpkg.com/@erwinstone/input-touchspin@1.0.3/dist/input-touchspin.min.js"></script>

        <link href="https://fonts.googleapis.com/css?family=Kalam" rel="stylesheet" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                width: 100vw;
            }

            body {
                overflow: hidden;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 6vw;
                background: black;
                height: 100%;
                width: 100%;
            }

            /* dropdown */

            #dropbtn {
                color: white;
                background: black;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                border: 5px solid Gray;
                border-radius: 15px;
            }

            .dropdown {
                position: relative;
                display: inline-block;
            }

            .dropdown-content {
                display: none;
                position: absolute;
                background-color: black;
                min-width: 160px;
                overflow: auto;
                z-index: 1;
                border-radius: 5px;
                box-shadow: 10px 10px 25px black;
                max-height: 70vh;
            }

            .dropdown-content a {
                color: black;
                font-size: 4vh;
                background: whiteSmoke;
                padding: 12px 16px;
                text-decoration: none;
                display: block;
                border: 1px solid gray;
                border-radius: 5px;
            }

            .show {
                display: block;
            }

            /* end of dropdown */


            /* hide forms */

            #my-response-iframe,
            #my-form {
                display: none;
            }
            /* */

            .child-one {
                height: 20vh;
                font-size: 7vh;

            }

            /* player names */

            #player1,
            #player2,
            #player3,
            #player4,
            #teamscore {
                text-align: left;
                padding-left: 1vw;
                height: 7vh;
                font-size: 5vw;
            }

            /* default "keyboard" */



            .submit {
                font-size: 7vh;
                color: white;
                //background: dodgerBlue;
                height: 25vh; //12vh;
                //line-height: 10vh;
                display: flex;
                justify-content: center;
                align-items: center;
                border: 5px solid Gray;
                border-radius: 15px;
            }


            #front9 {
                color: white;
                //height: 100vh;
            }

            tr {
                text-align: center;
            }
            td {
                //width: calc(100vw / 6);
            }
            .head {
                font-size: 4vw;
                height: 5vh;
            }

            #score1,
            #score2,
            #score3,
            #score4 {
                padding: 3vh;
                height: 11vh;
            }


            input {
                font-size: 4vh;
                color: white;
                background: black;
                width: 12vw;
                border: none;
            }

            #tsdown1,
            #tsdown2,
            #tsdown3,
            #tsdown4,
            #tsdown5,
            #tsup1,
            #tsup2,
            #tsup3,
            #tsup4,
            #tsup5 {
                font-size: 4vh;
                background: gray;
                width: 8vw;
            }

            #tsdown1,
            #tsdown2,
            #tsdown3,
            #tsdown4,
            #tsdown5 {
                float: left;
                background: black;
                color: cyan;
                border: none;
            }

            #tsup1,
            #tsup2,
            #tsup3,
            #tsup4,
            #tsup5 {
                float: right;
                background: black;
                color: cyan;
                border: none;
            }
        </style>
    </head>

    <body>
        <div id="page">
            <div class="child-one">
                <div onclick="toggleDropdown()" class="dropbtn" id="dropbtn">select player</div>
                <div id="playersDropdown" class="dropdown-content"></div>

            <div id="front9">

                    <tbody>
                        <tr>
                            <td colspan="3" class="head">player</td>
                            <td colspan="2" class="head">points</td>
                        </tr>
                        <tr>
                            <td colspan="3" id="player1">1</td>
                            <td colspan="2" id="points1">
                                <div id="ts1" class="touchspin">
                                    <button id="tsdown1" type="button" data-touchspin-down>-</button>
                                    <input
                                        id="tsscore1"
                                        type="number"
                                        min="0"
                                        data-touchspin-input
                                        style="text-align: center" />
                                    <button id="tsup1" type="button" data-touchspin-up>+</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="3" id="player2">2</td>
                            <td colspan="2" id="points2">
                                <div id="ts1" class="touchspin">
                                    <button id="tsdown2" type="button" data-touchspin-down>-</button>
                                    <input
                                        id="tsscore2"
                                        type="number"

                                    <button id="tsup2" type="button" data-touchspin-up>+</button>
                                </div>
                            </td>
                        </tr>

                        <tr>
                            <td colspan="3" id="player3">3</td>
                            <td colspan="2" id="points3">
                                <div id="ts3" class="touchspin">
                                    <button id="tsdown3" type="button" data-touchspin-down>-</button>
                                    <input
                                        id="tsscore3"
                                        type="number"
                                        min="0"
                                        data-touchspin-input
                                        style="text-align: center" />
                                    <button id="tsup3" type="button" data-touchspin-up>+</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="3" id="player4">4</td>
                            <td colspan="2" id="points4">
                                <div id="ts4" class="touchspin">
                                    <button id="tsdown4" type="button" data-touchspin-down>-</button>
                                    <input
                                        id="tsscore4"
                                        type="number"
                                        min="0"
                                        data-touchspin-input
                                        style="text-align: center" />
                                    <button id="tsup4" type="button" data-touchspin-up>+</button>
                                </div>
                            </td>
                        </tr>

                        <tr>
                            <td colspan="3" id="teamscore">Team score</td>
                            <td colspan="2" id="team">
                                <div id="ts5" class="touchspin">
                                    <button id="tsdown5" type="button" data-touchspin-down>-</button>
                                    <input
                                        id="tsscore5"
                                        type="number"
                                        min="0"
                                        data-touchspin-input
                                        style="text-align: center" />
                                    <button id="tsup5" type="button" data-touchspin-up>+</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <br />

                <div id="submit" class="submit" onclick="submitForm()">submit</div>
            </div>

            <!-- invisible but necessary for submit of data	-->
            <!-- form to construct data prior to submit -->
            <!--

https://docs.google.com/forms/d/e/1FAIpQLSelqGwakOEy-yeaKADOK-hPh8scrFT0fRgbplN1DOn0rCA5DQ/viewform?usp=pp_url

-->

            <form
                action="https://docs.google.com/forms/d/e/1FAIpQLSelqGwakOEy-yeaKADOK-hPh8scrFT0fRgbplN1DOn0rCA5DQ/formResponse"
                id="my-form"
                method="post"
                name="my-form"
                target="my-response-iframe">
                <!-- player -->
                <input id="mx1954606909" name="entry.1954606909" type="text" value="default" />
                <input id="mx89122071" name="entry.89122071" type="text" value="default" />
                <input id="mx842961819" name="entry.842961819" type="text" value="default" />
                <input id="mx1180492687" name="entry.1180492687" type="text" value="default" />
                <!-- points -->
                <input id="mx1395829184" name="entry.1395829184" type="text" value="default" />
                <input id="mx2018604116" name="entry.2018604116" type="text" value="default" />
                <input id="mx390274217" name="entry.390274217" type="text" value="default" />
                <input id="mx754308496" name="entry.754308496" type="text" value="default" />
                <!-- teamscore -->
                <input id="mx346825177" name="entry.346825177" type="text" value="default" />
                <input type="submit" />
            </form>
            <!-- google iframe inserted here - invisible -->
            <iframe
                title="my-response-iframe"
                height="0"
                id="my-response-iframe"
                name="my-response-iframe"
                src="https://docs.google.com/forms/d/e/1FAIpQLSelqGwakOEy-yeaKADOK-hPh8scrFT0fRgbplN1DOn0rCA5DQ/viewform?embedded=true"
                width="0">
            </iframe>
        </div>

        <script>
            //=================================================================================
            // this runs on startup or reload
            //
            //=================================================================================
            document.addEventListener("contextmenu", (event) => {
                event.preventDefault();
            });
            //new InputTouchspin(document.querySelector(".touchspin"));
            //new InputTouchspin(document.getElementById("ts1"));
            // player 1
            new InputTouchspin(document.querySelectorAll(".touchspin")[0]);
            // player 2
            new InputTouchspin(document.querySelectorAll(".touchspin")[1]);
            // player 3
            new InputTouchspin(document.querySelectorAll(".touchspin")[2]);
            // player 4
            new InputTouchspin(document.querySelectorAll(".touchspin")[3]);
            // team
            new InputTouchspin(document.querySelectorAll(".touchspin")[4]);

            var tempteamnumber = 0;
            var tempteam = "";
            var arrTemp = [];
            var player;
            //===========================
            // this code runs at startup
            //===========================
            //change wording to show downloading, change back when complete
            document.getElementById("dropbtn").innerText = "searching ...";
            getData();
            // need to set up a couple of arrays from the data in google sheets
            async function getData() {
                var dataStream = await fetch(
                    "https://opensheet.elk.sh/1ZktlHzXfxuZEjEAqr8puzb8Brt-iXojbLdL2Vo9iCDo/teeslotscsvtidy"
                );

                if (!dataStream.ok) {
                    const message = `An error has occured: ${dataStream.status}`;
                    //throw new Error(message);
                    alert("error: " + message);
                }
                var resultsarray = await dataStream.json();
                // split into separate arrays
                arrPlayers = resultsarray.map((d) => d.players);

                // remove null items
                arrPlayers = arrPlayers.filter(function (el) {
                    return el != null;
                });

                arrPlayers = arrPlayers.filter(function (el) {
                    return el != "";
                });

                // create teams of 4

                for (var i = 0; i < arrPlayers.length; i++) {
                    if (tempteamnumber == 4) {
                        arrTemp.push(tempteam);
                        tempteamnumber = 0;
                        tempteam = "";
                    }
                    if (tempteamnumber < 4) {
                        tempteam += arrPlayers[i] + ",";
                        tempteamnumber++;
                    }
                }

                dd = new Date();
                day = dd.getDay();
                document.getElementById("dropbtn").innerText = "select team";
                start();
            }

            //=============================================================
            //=============================================================
            // function start()
            // - initialise everything and do checks etc.
            //=============================================================
            function start() {
                var select = document.getElementById("playersDropdown");
                // this is what is created
                //<a id="myLink1" href="#" onclick='dropSelected(this.innerText);return false;'>Graham Airey</a>
                for (var i = 0; i < arrTemp.length; i++) {
                    var el = document.createElement("a");
                    el.id = "myLink" + i;
                    el.setAttribute("onclick", "dropSelected(this.innerText);return false;");
                    el.setAttribute("href", "#");
                    el.innerText = arrTemp[i].replaceAll(",", "\n"); //[0];
                    select.appendChild(el);
                }
            } // end function start()

            // Close the dropdown if the user clicks outside of it
            window.onclick = function (event) {
                if (!event.target.matches(".dropbtn")) {
                    var dropdowns = document.getElementsByClassName("dropdown-content");
                    var i;
                    for (i = 0; i < dropdowns.length; i++) {
                        var openDropdown = dropdowns[i];
                        if (openDropdown.classList.contains("show")) {
                            openDropdown.classList.remove("show");
                        }
                    }
                }
            };

            //=============================================================
            // functions - run when called
            //=============================================================

            //=============================================================
            //=============================================================
            // function dropSelected(playerName)
            // - selects player
            //=============================================================
            // name selected, do stuff
            function dropSelected(playerName) {
                //document.getElementById("points1").style.background = "dodgerBlue";
                // reset scores etc.
                //document.getElementById("points1").innerText = "0";
                //document.getElementById("points2").innerText = "0";
                //document.getElementById("points3").innerText = "0";
                //document.getElementById("points4").innerText = "0";

                //document.getElementById("team").innerText = "0";

                document.getElementById("dropbtn").innerText = "team selected";

                var player1 = playerName.split("\n")[0];
                var player2 = playerName.split("\n")[1];
                var player3 = playerName.split("\n")[2];
                var player4 = playerName.split("\n")[3];

                document.getElementById("player1").innerText = player1;
                document.getElementById("player2").innerText = player2;
                document.getElementById("player3").innerText = player3;
                document.getElementById("player4").innerText = player4;

                document.getElementById("tsscore1").value = 30;
                document.getElementById("tsscore2").value = 30;
                document.getElementById("tsscore3").value = 30;
                document.getElementById("tsscore4").value = 30;
                // team
                document.getElementById("tsscore5").value = 70;

                document.getElementById("submit").innerText = "submit";

                // modify scores for "no player"
                if (document.getElementById("player1").innerText == "----------") {
                    document.getElementById("tsscore1").value = 0;
                }
                if (document.getElementById("player2").innerText == "----------") {
                    document.getElementById("tsscore2").value = 0;
                }
                if (document.getElementById("player3").innerText == "----------") {
                    document.getElementById("tsscore3").value = 0;
                }
                if (document.getElementById("player4").innerText == "----------") {
                    document.getElementById("tsscore4").value = 0;
                }

                if (
                    document.getElementById("player1").innerText == "----------" &&
                    document.getElementById("player2").innerText == "----------" &&
                    document.getElementById("player3").innerText == "----------" &&
                    document.getElementById("player4").innerText == "----------"
                ) {
                    document.getElementById("tsscore5").value = 0;
                }

                // global player
                player = playerName;

                // close dropdown
                var dropdowns = document.getElementsByClassName("dropdown-content");
                var i;
                for (i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains("show")) {
                        openDropdown.classList.remove("show");
                    }
                }
            }

            //=============================================================
            // function toggleDropdown()
            // - show player name choices
            //=============================================================
            function toggleDropdown() {
                // When the user clicks on the button, toggle between hiding and showing the dropdown content
                document.getElementById("playersDropdown").classList.toggle("show");
            }

            //=============================================================
            // function submitForm()
            // - send info from HTML form to google form
            //=============================================================
            function submitForm() {
                //console.log("player1name = " + player1);
                // get the relevant info into a form
                // make sure everything is updated
                // player1 score entry
                //https://docs.google.com/forms/d/e/1FAIpQLSedd8eNHGeq6yjuzooApefrLSpIrBLFu-4oJF14cidzdu8SFQ/viewform?usp=pp_url
                // entry.1954606909=p1
                // entry.89122071=p2
                // entry.842961819=p3
                // entry.1180492687=p4
                //
                // entry.1395829184=po1
                // entry.2018604116=po2
                // entry.390274217=po3
                // entry.754308496=po4
                //
                // entry.346825177=tp
                // players
                document.getElementById("mx1954606909").value = document.getElementById("player1").innerText;
                document.getElementById("mx89122071").value = document.getElementById("player2").innerText;
                document.getElementById("mx842961819").value = document.getElementById("player3").innerText;
                document.getElementById("mx1180492687").value = document.getElementById("player4").innerText;
                // points
                document.getElementById("mx1395829184").value = document.getElementById("tsscore1").value;
                document.getElementById("mx2018604116").value = document.getElementById("tsscore2").value;
                document.getElementById("mx390274217").value = document.getElementById("tsscore3").value;
                document.getElementById("mx754308496").value = document.getElementById("tsscore4").value;
                // team
                document.getElementById("mx346825177").value = document.getElementById("tsscore5").value;

                //===== submit data ==========
                //============================
                if (
                    document.getElementById("player1").innerText == "----------" &&
                    document.getElementById("player2").innerText == "----------" &&
                    document.getElementById("player3").innerText == "----------" &&
                    document.getElementById("player4").innerText == "----------"
                ) {
                    alert("no team members, so not submitted.");
                } else {
                    document.forms[0].submit();
                }
                /*
                 // for testing ...
                alert(
                    document.getElementById("mx1954606909").value +
                        " " +
                        document.getElementById("mx89122071").value +
                        " " +
                        document.getElementById("mx842961819").value +
                        " " +
                        document.getElementById("mx1180492687").value +
                        " " +
                        document.getElementById("mx1395829184").value +
                        " " +
                        document.getElementById("mx2018604116").value +
                        " " +
                        document.getElementById("mx390274217").value +
                        " " +
                        document.getElementById("mx754308496").value +
                        " " +
                        document.getElementById("mx346825177").value
                );
*/

                document.getElementById("submit").innerText = "submit done";
                // vibrate if android phone or "pop" for anything else
                const canVibrate = window.navigator.vibrate;
                if (canVibrate) {
                    window.navigator.vibrate(50);
                }

                clearForm();
                document.getElementById("dropbtn").innerText = "select team";
            }

            function clearForm() {
                // reset each hole
                document.getElementById("player1").innerText = "1";
                document.getElementById("player2").innerText = "2";
                document.getElementById("player3").innerText = "3";
                document.getElementById("player4").innerText = "4";

                document.getElementById("tsscore1").value = 30;
                document.getElementById("tsscore2").value = 30;
                document.getElementById("tsscore3").value = 30;
                document.getElementById("tsscore4").value = 30;

                document.getElementById("tsscore5").value = 70;
            }
        </script>
    </body>
</html>
