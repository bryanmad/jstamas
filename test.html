<!doctype html>
<html>
	<head>
		<title>jQuery Nice Number Example</title>

		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<script src="https://unpkg.com/@erwinstone/input-touchspin@1.0.3/dist/input-touchspin.min.js"></script>

		<script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>

		<style>
			* {
				color: blue;
				font-size: 10vh;
			}
			button {
				width: 10vw;
			}
			#score {
				width: 15vw;
			}
		</style>
	</head>
	<body>
		<h1>A Very Unpolished Collection of Examples</h1>
		<div class="touchspin">
			<button type="button" data-touchspin-down>-</button>
			<input id="score" type="number" data-touchspin-input style="text-align: center" />
			<button type="button" data-touchspin-up>+</button>
		</div>
		<button id="scoreresult" onclick="getScore()">result</button>
		<script>
			new InputTouchspin(document.querySelector(".touchspin"));
			function getScore() {
				document.getElementById("scoreresult").innerText = document.getElementById("score").value;
			}
		</script>
	</body>
</html>
