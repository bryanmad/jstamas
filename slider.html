<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Input Range Slider</title>
    <link rel="stylesheet" href="style.css">

<style>


@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap');

* {
  margin: 0;
  padding: 0;
  font-family: "Poppins", sans-serif;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
  background:black;
}
div {
  position: absolute;
}
#rangeValue {
  position: relative;
  display: block;
  text-align: center;
  font-size: 6em;
  color: gray;
  font-weight: 400;
}

.range1 {
  width: 90vw;
  height: 15px;
  -webkit-appearance: none;
  background: black;
  outline: none;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: inset 0 0 5px rgba(0, 0, 0, 1);
margin-bottom: 10vh;



}
.range1::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: lime;
  cursor: pointer;
  border: 4px solid #333;
  box-shadow: -407px 0 0 400px lime;
}

.range2 {
  width: 90vw;
  height: 15px;
  -webkit-appearance: none;
  background: black;
  outline: none;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: inset 0 0 5px rgba(0, 0, 0, 1);
margin-bottom: 10vh;


}
.range2::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 5vh;
  height: 5vh;
  border-radius: 50%;
  background: cyan;
  cursor: pointer;
  border: 4px solid #333;
  box-shadow: -407px 0 0 400px cyan;
}













.box {

}

outerbox {

}

.spacer {
    padding-bottom: 20vh;
    width: 100%;
}

.sliderbox {
    border: 3px solid gray;
}

</style>





</head>

<body>
    <div class="sliderbox">
        <span id="rangeValue">0</span>
        <Input class="range1" id="range1" type="range" name "" value="0" min="0" max="100" step="10" onInput="rangeSlide1(this.value)" onmousemove="rangeSlide1(this.value)"></Input>

        <Input class="range2" id="range2" type="range" name "" value="0" min="0" max="9" step="1" onInput="rangeSlide2(this.value)" onmousemove="rangeSlide2(this.value)"></Input>

    </div>



    <script type="text/javascript">
    var currentones = 0;
    var currenttens = 0;
    // 10's
        function rangeSlide1(value) {
          currentones = value;
            document.getElementById('rangeValue').innerHTML = parseInt(currenttens) + parseInt(currentones);

        }
    // units
        function rangeSlide2(value) {
          currenttens = value;
            document.getElementById('rangeValue').innerHTML = parseInt(currenttens) + parseInt(currentones);

        }
    </script>
</body>

</html>
