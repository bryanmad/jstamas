    <body>
        <div id="pagetwo">
            <div
                id="imgbackcontainer"
                class="imgbackcontainer"
                onclick="swapp3p5()"
            >
                show<br />par 5
            </div>

            <!-- leaderboard -->

        <script>
            //=================================================================================
            // this runs on startup or reload
            //
            //=================================================================================
            // prevent default img menu of options
            document.addEventListener("contextmenu", (event) => {
                event.preventDefault();
            });

            // declare global variables
            var data;

            // set up courses with details for calculations etc.
            // array ["hole num",par,si]
            // Arcot
            // hole, par, si
            arrCourse = [
                [0, 0, 0],
                [1, 5, 7],
                [2, 4, 13],
                [3, 4, 9],
                [4, 4, 3],
                [5, 3, 11],
                [6, 5, 1],
                [7, 4, 5],
                [8, 4, 17],
                [9, 3, 15],
                [10, 4, 4],
                [11, 3, 14],
                [12, 5, 6],
                [13, 3, 12],
                [14, 5, 2],
                [15, 4, 18],
                [16, 4, 10],
                [17, 4, 8],
                [18, 4, 16],
            ];
            getData();
            //===========================
            // this code runs at startup
            //===========================
            async function getData() {
                var url =
                    "https://opensheet.elk.sh/177jxMJFqFd6ZDtLf4sLvBkaeIS8MU9drvNXmC_zKP-E/par3and5";
                try {
                    data = await fetch(url);
                    if (!data.ok) {
                        throw new Error(`Response status: ${data.status}`);
                    }
                    data = await data.json();
                    // don't need blank players
                    data = data.filter(function (el) {
                        return el.playersp3 !== "";
                    });

                    start();
                } catch (error) {
                    console.error(error.message);
                }
            }
            //=============================================================
            //=============================================================
            // function start()
            // - initialise everything and do checks etc.
            //=============================================================
            function start() {
                $("#pagetwo").fadeIn(500);

                // data is sorted with highest score first so test that to see if it >0
                //console.log("data[0].playerpoints = " + data.length);

                // change < to >
                useDataResults();
            } // end function start()

            //=============================================================
            // functions - run when called
            //=============================================================

            //=============================================================
            // async function getData()
            // - gets results data
            //=============================================================

            function useDataResults() {
                let container = document.getElementById(
                    "createleaderboarditems",
                );
                // empty container
                container.innerHTML = "";
                console.log(data[0].playersp3);
                data.forEach((el, i) => {
                    let box = document.createElement("div");
                    box.id = "box" + i;
                    box.className = "team";
                    box.setAttribute(
                        "onclick",
                        "showStats(this.id);return false;",
                    );

                    let name = document.createElement("span");
                    name.id = "name" + i;
                    name.className = "name";
                    name.innerHTML = el.playersp3;

                    let p3scores = document.createElement("span");
                    p3scores.id = "p3scores" + i;
                    p3scores.className = "p3scores";

                    let p5scores = document.createElement("span");
                    p5scores.id = "p5scores" + i;
                    p5scores.className = "p5scores";

                    let position = document.createElement("span");
                    position.id = "position" + i;
                    position.className = "position";
                    position.innerHTML = i;

                    box.appendChild(position);
                    box.appendChild(name);

                    box.appendChild(p3scores);

                    box.appendChild(p5scores);

                    container.appendChild(box);
                    // fade the initial view
                    box.style.opacity = 0.3;
                });

                // do proper display
                data.forEach((el, k) => {
                    setTimeout(function () {
                        if (el.playersp3 !== "") {
                            bodyUpdatep3(
                                el.playersp3,
                                el.par3,
                                el.positionp3,
                                k,
                            );
                        }
                    }, k * 300);
                });
            }

            function bodyUpdatep3(nom, scr, pos, k) {
                console.log("bodyUpdatep3");
                document.getElementById("headerpagetwo").innerText =
                    "Par 3 champion";

                let elementName = document.getElementsByClassName("name")[k];
                let elementScore =
                    document.getElementsByClassName("p3scores")[k];
                let elementPos = document.getElementsByClassName("position")[k];

                setTimeout(function () {
                    elementName.innerText = nom;
                    elementScore.innerText = scr;
                    elementPos.innerText = pos;

                    elementName.parentNode.style.opacity = 1;
                }, k * 100);
            }

            function bodyUpdatep5(nom, scr, pos, k) {
                console.log("bodyUpdatep5");
                document.getElementById("headerpagetwo").innerText =
                    "Par 5 champion";

                let elementName = document.getElementsByClassName("name")[k];
                let elementScore =
                    document.getElementsByClassName("p3scores")[k];
                let elementPos = document.getElementsByClassName("position")[k];

                setTimeout(function () {
                    elementName.innerText = nom;
                    elementScore.innerText = scr;
                    elementPos.innerText = pos;

                    elementName.parentNode.style.opacity = 1;
                }, k * 100);
            }

            function swapp3p5() {
                test = document.getElementById("imgbackcontainer").innerHTML;
                console.log("test = " + test);
                if (test.indexOf("show<br>par 3") > -1) {
                    document.getElementById("imgbackcontainer").innerHTML =
                        "show<br>par 5";

                    // do proper display
                    data.forEach((el, k) => {
                        setTimeout(function () {
                            if (el.playersp3 !== "") {
                                bodyUpdatep3(
                                    el.playersp3,
                                    el.par3,
                                    el.positionp3,
                                    k,
                                );
                            }
                        }, k * 300);
                    });
                }

                if (test.indexOf("show<br>par 5") > -1) {
                    document.getElementById("imgbackcontainer").innerHTML =
                        "show<br>par 3";

                    // do proper display
                    data.forEach((el, k) => {
                        setTimeout(function () {
                            if (el.playersp5 !== "") {
                                bodyUpdatep5(
                                    el.playersp5,
                                    el.par5,
                                    el.positionp5,
                                    k,
                                );
                            }
                        }, k * 300);
                    });
                }
            }
