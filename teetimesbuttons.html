        <button id="buttonforwednesday" onclick="buttonWednesday()">Wednesday</button>

        <form

            method="post"

            target="my-response-iframe">
            <!-- day -->
            <input id="mx1128778441" name="entry.1128778441" type="text" value="default" />
            <!-- p1 -->

            <!-- p2 -->

            <!-- p11 -->

            <!-- p12 -->

            <input type="submit" />
        </form>
        <!-- google iframe inserted here - invisible -->

            title="teetimes"
            height="0"

            src="https://docs.google.com/forms/d/e/1FAIpQLScFK8JK2SlfivsoWswPE4xjtIh2grOAzyRqb3KdKmY-sNjDKA/viewform?embedded=true"
            width="0">
        </iframe>

        <script>
            document.addEventListener("contextmenu", (event) => {
                event.preventDefault();
            });

            var arrPlayers;
            var arrEntries;

            arrEntries = [];

            arrPlayers = [
                "Andy",
                "Bob",
                "Bryan",
                "Dale",
                "Graham",
                "Joe",
                "JohnD",
                "JohnM",
                "Oz",
                "Peter",
                "Richard",
                "Steve"
            ];

            //resetArr();

            if (whichDay() == "Monday") {
                document.getElementById("buttonformonday").style.display = "flex";
                buttonMonday();
            }

            if (whichDay() == "Tuesday") {
                document.getElementById("buttonfortuesday").style.display = "flex";
                buttonTuesday();
            }

            if (whichDay() == "Wednesday") {
                document.getElementById("buttonforwednesday").style.display = "flex";
                buttonWednesday();
            }

            if (whichDay() == "Thursday") {
                document.getElementById("buttonforthursday").style.display = "flex";
                buttonThursday();
            }

            if (whichDay() == "Friday" || whichDay() == "Saturday" || whichDay() == "Sunday") {
                document.getElementById("buttonfornone").style.display = "flex";
            }

            //========================================
            // functions
            //========================================

            function buttonThursday() {
                manipulateArrayOtherDays(arrPlayers);
                shuffle(arrPlayers);
                arrEntries.push(whichDay());
                for (i = 0; i < arrPlayers.length; i++) {
                    arrEntries.push(arrPlayers[i]);
                }
                arrEntries.push("Andy");
                arrEntries.push("JohnD");

                submitForm();
            }

            function buttonWednesday() {
                manipulateArrayOtherDays(arrPlayers);
                shuffle(arrPlayers);
                arrEntries.push(whichDay());
                for (i = 0; i < arrPlayers.length; i++) {
                    arrEntries.push(arrPlayers[i]);
                }
                arrEntries.push("Andy");
                arrEntries.push("JohnD");

                submitForm();
            }

            function buttonTuesday() {
                manipulateArrayOtherDays(arrPlayers);
                shuffle(arrPlayers);
                arrEntries.push(whichDay());
                for (i = 0; i < arrPlayers.length; i++) {
                    arrEntries.push(arrPlayers[i]);
                }
                arrEntries.push("Andy - walking");
                arrEntries.push("JohnD - walking");

                submitForm();
            }

            function buttonMonday() {
                manipulateArrayMonday(arrPlayers);
                shuffle(arrPlayers);
                arrEntries.push(whichDay());
                for (i = 0; i < arrPlayers.length; i++) {
                    arrEntries.push(arrPlayers[i - 1]);
                }
                arrEntries.push("JohnM");
                arrEntries.push("Joe");
                arrEntries.push("Andy");
                arrEntries.push("JohnD");

                submitForm();
            }

            function shuffle(array) {
                let currentIndex = array.length;

                // While there remain elements to shuffle...
                while (currentIndex != 0) {
                    // Pick a remaining element...
                    let randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;

                    // And swap it with the current element.
                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                }
            }

            function manipulateArrayMonday(array) {
                // Monday it would just be 8 players who are in buggies (Jmc, Joe, Andy and JD walking)
                // other 3 days it would be 8 in buggies and remains 2 to playwith JD and Andy on foot
                // remove Jmc, Joe, Andy, JD
                var index = array.indexOf("JohnM");
                if (index > -1) {
                    array.splice(index, 1);
                }
                var index = array.indexOf("Joe");
                if (index > -1) {
                    array.splice(index, 1);
                }
                var index = array.indexOf("Andy");
                if (index > -1) {
                    array.splice(index, 1);
                }
                var index = array.indexOf("JohnD");
                if (index > -1) {
                    array.splice(index, 1);
                }
            }

            function manipulateArrayOtherDays(array) {
                // Monday it would just be 8 players who are in buggies (Jmc, Joe, Andy and JD walking)
                // other 3 days it would be 8 in buggies and remains 2 to playwith JD and Andy on foot
                // remove Jmc, Joe, Andy, JD
                var index = array.indexOf("Andy");
                if (index > -1) {
                    array.splice(index, 1);
                }
                var index = array.indexOf("JohnD");
                if (index > -1) {
                    array.splice(index, 1);
                }
            }

            function resetArr() {
                arrPlayers = [
                    "Andy",
                    "Bob",
                    "Bryan",
                    "Dale",
                    "Graham",
                    "Joe",
                    "JohnD",
                    "JohnM",
                    "Oz",
                    "Peter",
                    "Richard",
                    "Steve"
                ];

                arrEntries = [];

                document.getElementById("mx1128778441").value = "";
                document.getElementById("mx1947858612").value = "";
                document.getElementById("mx2032682500").value = "";
                document.getElementById("mx911459720").value = "";
                document.getElementById("mx1962266904").value = "";
                document.getElementById("mx2117794420").value = "";
                document.getElementById("mx421859266").value = "";
                document.getElementById("mx233293744").value = "";
                document.getElementById("mx44027195").value = "";
                document.getElementById("mx1073395585").value = "";
                document.getElementById("mx527083497").value = "";
                document.getElementById("mx1717757436").value = "";
                document.getElementById("mx308534750").value = "";
            }

            function submitForm() {
                //console.log(arrEntries[3]);
                document.getElementById("mx1128778441").value = arrEntries[0];
                document.getElementById("mx1947858612").value = arrEntries[1];
                document.getElementById("mx2032682500").value = arrEntries[2];
                document.getElementById("mx911459720").value = arrEntries[3];
                document.getElementById("mx1962266904").value = arrEntries[4];
                document.getElementById("mx2117794420").value = arrEntries[5];
                document.getElementById("mx421859266").value = arrEntries[6];
                document.getElementById("mx233293744").value = arrEntries[7];
                document.getElementById("mx44027195").value = arrEntries[8];
                document.getElementById("mx1073395585").value = arrEntries[9];
                document.getElementById("mx527083497").value = arrEntries[10];
                document.getElementById("mx1717757436").value = arrEntries[11];
                document.getElementById("mx308534750").value = arrEntries[12];

                //===== submit data ==========
                //============================
                document.forms[0].submit();

                // vibrate if android phone
                const canVibrate = window.navigator.vibrate;
                if (canVibrate) {
                    window.navigator.vibrate(50);
                }
                resetArr();
            }

            function whichDay() {
                // if run before noon give same day
                // if after noon give tomorrow
                var days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                var d = new Date();
                d.setHours(d.getHours() + 12);
                console.log("day = " + days[d.getDay()]);
                return days[d.getDay()];
            }
        </script>
    </body>
</html>
